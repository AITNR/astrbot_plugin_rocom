<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远行商人</title>
    <style>
/* 远行商人样式 */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-font: "Microsoft YaHei", "微软雅黑", sans-serif;
    --title-color: #4a3728;
    --text-color: #5d4e3f;
    --accent-color: #c9a962;
    --bg-color: #f5f0e8;
}

body {
    font-family: var(--primary-font);
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.merchant-page {
    position: relative;
    width: 100%;
    height: 100vh;
    background-color: var(--bg-color);
}

/* 背景 */
.background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.3;
    z-index: 0;
}

/* 内容容器 */
.content-container {
    position: relative;
    z-index: 1;
    padding: 1.5rem;
    max-width: 800px;
    margin: 0 auto;
}

/* 头部 */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 2px solid rgba(74, 55, 40, 0.2);
}

.title-section {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
}

.title-main {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.title-icon {
    font-size: 2rem;
}

.title-text {
    font-size: 2rem;
    font-weight: bold;
    color: var(--title-color);
    letter-spacing: 0.1em;
}

.subtitle {
    font-size: 0.9rem;
    color: var(--text-color);
    font-weight: 500;
}

.close-btn {
    font-size: 2rem;
    color: var(--title-color);
    cursor: pointer;
    width: 2.5rem;
    height: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background-color: rgba(74, 55, 40, 0.1);
    transition: all 0.3s ease;
}

.close-btn:hover {
    background-color: rgba(74, 55, 40, 0.2);
}

/* 货币栏 */
.currency-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(245, 240, 232, 0.95));
    padding: 0.8rem 1.2rem;
    border-radius: 0.8rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.currency-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-color);
}

.currency-amount {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: linear-gradient(135deg, #f9f3e6, #fff);
    padding: 0.4rem 1rem;
    border-radius: 2rem;
    border: 2px solid var(--accent-color);
}

.currency-icon {
    width: 1.5rem;
    height: 1.5rem;
    object-fit: contain;
}

.amount-value {
    font-size: 1.3rem;
    font-weight: bold;
    color: var(--accent-color);
}

/* 轮次信息 */
.round-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.8);
    padding: 0.8rem 1.2rem;
    border-radius: 0.8rem;
    margin-bottom: 1.2rem;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
}

.round-title {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
}

.round-label {
    font-size: 1.3rem;
    font-weight: bold;
    color: var(--title-color);
}

.round-count {
    font-size: 1rem;
    color: var(--text-color);
    font-weight: 500;
}

.countdown {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: #c94e4e;
    font-weight: 600;
    font-size: 1.1rem;
}

.countdown-icon {
    font-size: 1.2rem;
}

.countdown-time {
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
}

/* 商品网格 */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
}

/* 商品卡片 */
.product-card {
    display: flex;
    gap: 0.8rem;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 1rem;
    padding: 0.8rem;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
    transition: all 0.3s ease;
    border: 2px solid transparent;
}

.product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
    border-color: var(--accent-color);
}

.product-image-container {
    flex-shrink: 0;
    width: 5.5rem;
    height: 5.5rem;
    border-radius: 0.8rem;
    overflow: hidden;
    background: linear-gradient(135deg, #f9f3e6, #fff);
    border: 2px solid rgba(201, 169, 98, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
}

.product-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.product-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
}

.product-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--title-color);
    margin-bottom: 0.3rem;
}

.product-details {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
}

.product-price {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    background: linear-gradient(135deg, #fff9e6, #fff);
    padding: 0.25rem 0.6rem;
    border-radius: 1rem;
    border: 1px solid var(--accent-color);
}

.price-icon {
    width: 1rem;
    height: 1rem;
    object-fit: contain;
}

.product-price span {
    font-size: 0.95rem;
    font-weight: bold;
    color: var(--accent-color);
}

.product-stock,
.product-limit {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.85rem;
    padding: 0.2rem 0.5rem;
    border-radius: 0.5rem;
}

.product-stock {
    background-color: rgba(76, 175, 80, 0.15);
    color: #4caf50;
}

.product-limit {
    background-color: rgba(255, 152, 0, 0.15);
    color: #ff9800;
}

.stock-label,
.limit-label {
    font-weight: 500;
}

.stock-value,
.limit-value {
    font-weight: bold;
}

/* 响应式 */
@media (max-width: 600px) {
    .content-container {
        padding: 1rem;
    }

    .title-text {
        font-size: 1.5rem;
    }

    .products-grid {
        grid-template-columns: 1fr;
    }

    .product-card {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .product-image-container {
        width: 6rem;
        height: 6rem;
    }

    .product-details {
        justify-content: center;
    }
}
    </style>
</head>
<body>
    <div class="merchant-page">
        <!-- 背景 -->
        <div class="background" style="background-image: url('{{background}}');"></div>
        
        <!-- 内容区域 -->
        <div class="content-container">
            <!-- 头部 -->
            <div class="header">
                <div class="title-section">
                    <div class="title-main">
                        <span class="title-icon">🏪</span>
                        <span class="title-text">{{title}}</span>
                    </div>
                    <div class="subtitle">{{subtitle}}</div>
                </div>
                <div class="close-btn">✕</div>
            </div>

            <!-- 货币显示 -->
            <div class="currency-bar">
                <span class="currency-name">{{currency.name}}</span>
                <div class="currency-amount">
                    <img class="currency-icon" src="{{currency.icon}}" alt="">
                    <span class="amount-value">{{currency.amount}}</span>
                </div>
            </div>

            <!-- 轮次信息 -->
            <div class="round-info">
                <div class="round-title">
                    <span class="round-label">常规商品</span>
                    <span class="round-count">({{round_info.current}}/{{round_info.total}}轮)</span>
                </div>
                <div class="countdown">
                    <span class="countdown-icon">⏳</span>
                    <span class="countdown-time">{{round_info.countdown}}</span>
                </div>
            </div>

            <!-- 商品列表 -->
            <div class="products-grid">
                {% for product in products %}
                <div class="product-card">
                    <div class="product-image-container">
                        <img class="product-image" src="{{product.image}}" alt="{{product.name}}">
                    </div>
                    <div class="product-info">
                        <div class="product-name">{{product.name}}</div>
                        <div class="product-details">
                            <div class="product-price">
                                <img class="price-icon" src="{{currency.icon}}" alt="">
                                <span>{{product.price}}</span>
                            </div>
                            <div class="product-stock">
                                <span class="stock-label">库存</span>
                                <span class="stock-value">{{product.stock}}</span>
                            </div>
                            <div class="product-limit">
                                <span class="limit-label">限购</span>
                                <span class="limit-value">{{product.limit}}</span>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
