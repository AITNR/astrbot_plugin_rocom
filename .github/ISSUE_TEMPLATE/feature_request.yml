name: 💡 功能建议 / 意见反馈
description: 对 AstrBot 洛克王国世界插件提建议或意见
title: "[建议] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **本模板仅面向 astrbot_plugin_rocom**（AstrBot 侧展示、命令、配置等）。

        若需求主要涉及 **WeGame 统一接口、服务端或前后端能力**，请到 [WeGame-plugin](https://github.com/Entropy-Increase-Team/WeGame-plugin/issues) 讨论。

  - type: dropdown
    id: scope
    attributes:
      label: 建议归属
      options:
        - 本仓库：AstrBot 插件内能力
        - 更偏 WeGame 前后端 / API（更建议到 WeGame-plugin）
        - 其他
    validations:
      required: true

  - type: dropdown
    id: suggestion-type
    attributes:
      label: 建议类型
      options:
        - 新功能请求
        - 展示/渲染/交互优化
        - 现有能力改进
        - 文档说明
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景与需求
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 希望实现的效果
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 可替代方案
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
    validations:
      required: false
